<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Eletrônico</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid justify-content-center">
     <spam class="navbar-brand mb-0 h1">Prontuário Eletrônico</spam>
    </div>
    </nav>

    <div class="container mt-4">
    <form onsubmit="mostrarDados(); return false">
     
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Dados do Paciente
    </div>

    <div class="card-body">
    <div class="row">
    <div class="col-md-6 mb-3">
    <label class="form-label">Nome</label>
    <input type="text" id="nome" class="form-control" required>
    </div>
    <br></br>

    <div class="col-md-3 mb-3">
    <label class="form-label">idade</label>
    <input type="text" id="idade" class="form-control" required>
    </div>
    
    <div class="col-md-3 mb-3">
    <label class="form-label">Sexo</label>
    <select id="sexo" class="form-control" required>
    <option>Masculino</option>
    <option>Feminino</option>
    </select>
    </div>
    

    </div>
    </div>
    </div>

      
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
        Sinais Vitais
    </div>

    <div class="card-body">
    <div class="row">

        <div class="col-md-3 mb-3">
        <label class="form-label">Pressão Arterial</label>
        <input type="text" id="pressão" class="form-control" required placeholder="Ex 120/80">
        </div>

        <div class="col-md-3 mb-3">
        <label class="form-label">temperatura</label>
        <input type="text" id="temperatura" class="form-control" required placeholder="Ex 36.5°">
        </div>

         <div class="col-md-3 mb-3">
        <label class="form-label">Frequência Cardiaca</label>
        <input type="text" id="frequência" class="form-control" required>
        </div>

         <div class="col-md-3 mb-3">
        <label class="form-label">Saturação </label>
        <input type="text" id="saturacao" class="form-control" required>
        </div>

    </div>
    </div>
    </div>

  <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Evolução do Paciente
    </div>
      
 <div class="card-body">   
 <div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label" required>Descreva a Evolução</label>
  <textarea id="evolucao" class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
</div>

    </div>

    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Medicação
    </div>

    <div class="card-body">
    <div class="row">

    <div class="col-md-6 mb-3">
     <label class="form-label">Medicamento</label>
     <input type="text" id="medicamento" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
     <label class="form-label">Dosagem</label>
     <input type="text" id="dosagem" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
     <label class="form-label">Horário</label>
     <input type="time" id="hórario" class="form-control" required>
    </div>

    </div>
    </div>
    </div>

    <div class="text-end mb-5">
    <button class="btn btn-primary" type="submit">Salvar Prontuário</button>
    </div>
    
    </form>
    </div>  
    
    <div id="resultado" class="alert alert-secondary d-none text-center"></div>
    
    <div class="toast position-fixed bottom-0 end-0 p-3" id="toastSucesso">
    <div class="toast-header">
    <strong class="me-auto">Sistema</strong>
    <button type="button" class="btn-close" database-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body">
        Prontuário salvo com sucesso!
    </div>
    </div>

    <script>
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    
        function mostrarDados(){

        let nome = document.querySelectorAll("input")[0].value;   
        let idade = document.querySelectorAll("input")[1].value; 
        let sexo = document.querySelectorAll("select").value; 

        let pressão = document.querySelectorAll("input")[2].value;
        let temperatura = document.querySelectorAll("input")[3].value;
        let frequência = document.querySelectorAll("input")[4].value;
        let saturacao = document.querySelectorAll("input")[5].value;  

        let evolucao = document.querySelectorAll("textarea")[5].value; 
         
        let medicamento = document.querySelectorAll("input")[6].value; 
        let dosagem = document.querySelectorAll("input")[7].value;
        let hórario = document.querySelectorAll("input")[8].value;  

        let resultado = `
        <h5>Prontuário do Paciênte</h5>
        Nome: ${nome} <br>
        Idade: ${idade} <br>
        Sexo: ${sexo} <br>
        Pressão Arterial: ${pressão} <br>
        Temperatura: ${temperatura} <br>
        Frequência Cádiaca: ${frequência} <br>
        Saturação: ${saturacao} <br>
        Evolução: ${evolucao} <br>
        Medicamento: ${medicamento} <br>
        Dosagem: ${dosagem} <br>
        Hórario: ${hórario}
        `;
        
        let caixa = document.getElementById("Resultado");
        caixa.innerHTML = resultado;
        caixa.classList.remove("d-none");

        let toast = new bootstrap.Toast(document.getElementById('toastSucesso'));
        toast.show();

        }
        </script>
</body>
</html>
