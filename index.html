<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Eletrônico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid justify-content-center">
        <span class="navbar-brand mb-0 h1">Prontuário Eletrônico</span>
        </div>
    </nav>

    <div class="container mt-4">
    <form onsubmit="mostrarDados(); return false">
    
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">Dados do Paciente</div>
    <div class="card-body">
    <div class="row">


    <div class="col-md-6 mb-3">
    <label class="form-label">Nome</label>
    <input type="text" id="nome" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Idade</label>
    <input type="text" id="idade" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Sexo</label>
    <select id="sexo" class="form-control" required>
    <option>Masculino</option>
    <option>Feminino</option>
    </select>
    </div>

    </div>
    </div>
    </div>

            
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">Sinais Vitais</div>
    <div class="card-body">
    <div class="row">

    <div class="col-md-3 mb-3">
    <label class="form-label">Pressão Arterial</label>
    <input type="text" id="pressao" class="form-control" required placeholder="Ex 120/80">
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Temperatura</label>
    <input type="text" id="temperatura" class="form-control" required placeholder="Ex 36.5°">
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Frequência Cardíaca</label>
    <input type="text" id="frequencia" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Saturação</label>
    <input type="text" id="saturacao" class="form-control" required>
    </div>

    </div>
    </div>
    </div>

       
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">Evolução do Paciente</div>
    <div class="card-body">

    <div class="mb-3">
    <label class="form-label">Descreva a Evolução</label>
    <textarea id="evolucao" class="form-control" rows="3"></textarea>
    </div>
    
    </div>
    </div>

           
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">Medicação</div>
    <div class="card-body">
    <div class="row">
        
    <div class="col-md-6 mb-3">
    <label class="form-label">Medicamento</label>
    <input type="text" id="medicamento" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Dosagem</label>
    <input type="text" id="dosagem" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
    <label class="form-label">Horário</label>
    <input type="time" id="horario" class="form-control" required>
    </div>

    </div>
    </div>
    </div>

    <div class="text-end mb-5">
    <button class="btn btn-primary" type="submit">Salvar Prontuário</button>
    </div>

    </form>
    </div>

    <div id="resultado" class="alert alert-secondary d-none text-center"></div>

    <div class="toast position-fixed bottom-0 end-0 p-3" id="toastSucesso">
        <div class="toast-header">
            <strong class="me-auto">Sistema</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">Prontuário salvo com sucesso!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

        function mostrarDados() {
            let nome = document.getElementById("nome").value;
            let idade = document.getElementById("idade").value;
            let sexo = document.getElementById("sexo").value;

            let pressao = document.getElementById("pressao").value;
            let temperatura = document.getElementById("temperatura").value;
            let frequencia = document.getElementById("frequencia").value;
            let saturacao = document.getElementById("saturacao").value;

            let evolucao = document.getElementById("evolucao").value;

            let medicamento = document.getElementById("medicamento").value;
            let dosagem = document.getElementById("dosagem").value;
            let horario = document.getElementById("horario").value;

            let resultado = `
                <h5>Prontuário do Paciente</h5>
                Nome: ${nome} <br>
                Idade: ${idade} <br>
                Sexo: ${sexo} <br>
                Pressão Arterial: ${pressao} <br>
                Temperatura: ${temperatura} <br>
                Frequência Cardíaca: ${frequencia} <br>
                Saturação: ${saturacao} <br>
                Evolução: ${evolucao} <br>
                Medicamento: ${medicamento} <br>
                Dosagem: ${dosagem} <br>
                Horário: ${horario}
            `;

            let caixa = document.getElementById("resultado");
            caixa.innerHTML = resultado;
            caixa.classList.remove("d-none");

            let toast = new bootstrap.Toast(document.getElementById('toastSucesso'));
            toast.show();
        }
</script>
</body>
</html>
