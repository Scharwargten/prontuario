<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Eletrônico</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid justify-content-center">
     <spam class="navbar-brand mb-0 h1">Prontuário Eletrônico</spam>
    </div>
    </nav>

    <div class="container mt-4">
    <form>
     
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Dados do Paciente
    </div>

    <div class="card-body">
    <div class="row">
    <div class="col-md-6 mb-3">
    <label class="form-label">Nome</label>
    <input type="text" class="form-control" required>
    </div>
    <br></br>

    <div class="col-md-3 mb-3">
    <label class="form-label">idade</label>
    <input type="text" class="form-control" required>
    </div>
    
    <div class="col-md-3 mb-3">
    <label class="form-label">Sexo</label>
    <select class="form-control" required>
    <option>Masculino</option>
    <option>Feminino</option>
    </select>
    </div>
    

    </div>
    </div>
    </div>

      
    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
        Sinais Vitais
    </div>

    <div class="card-body">
    <div class="row">

        <div class="col-md-3 mb-3">
        <label class="form-label">Pressão Arterial</label>
        <input type="text" class="form-control" required placeholder="Ex 120/80">
        </div>

        <div class="col-md-3 mb-3">
        <label class="form-label">temperatura</label>
        <input type="text" class="form-control" required placeholder="Ex 36.5°">
        </div>

         <div class="col-md-3 mb-3">
        <label class="form-label">Frequência Cardiaca</label>
        <input type="text" class="form-control" required>
        </div>

         <div class="col-md-3 mb-3">
        <label class="form-label">Saturação </label>
        <input type="text" class="form-control" required>
        </div>

    </div>
    </div>
    </div>

  <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Evolução do Paciente
    </div>
      
 <div class="card-body">   
 <div class="mb-3">
  <label for="exampleFormControlTextarea1" class="form-label" required>Descreva a Evolução</label>
  <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
</div>

    </div>

    <div class="card mb-4">
    <div class="card-header bg-info text-white text-center">
    Medicação
    </div>

    <div class="card-body">
    <div class="row">

    <div class="col-md-6 mb-3">
     <label class="form-label">Medicamento</label>
     <input type="text" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
     <label class="form-label">Dosagem</label>
     <input type="text" class="form-control" required>
    </div>

    <div class="col-md-3 mb-3">
     <label class="form-label">Horário</label>
     <input type="time" class="form-control" required>
    </div>

    </div>
    </div>
    </div>

    <div class="text-end mb-5">
    <button class="btn btn-primary" type="submit">Salvar Prontuário</button>
    </div>
    
    </form>
    </div>
</body>
</html>
